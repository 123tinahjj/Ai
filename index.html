<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام تتبع الوقت | Time Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-card: rgba(18, 18, 24, 0.98);
            --border-color: #2a2a35;
            --accent-primary: #4a9eff;
            --accent-secondary: #6c5ce7;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a8;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #ff7675;
            --info: #74b9ff;
            --sleep: #6c5ce7;
            --work: #e84393;
            --leisure: #00cec9;
        }

        body.light-mode {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.98);
            --border-color: #e0e0e5;
            --text-primary: #1a1a1f;
            --text-secondary: #5a5a6a;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            .full-width {
                grid-column: span 2;
            }
            body {
                padding: 30px;
            }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .time-budget-card {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.1), rgba(108, 92, 231, 0.1));
            border: 1px solid var(--accent-primary);
        }

        .progress-container {
            background: var(--border-color);
            height: 25px;
            border-radius: 40px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.5s;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-action {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            margin: 12px 0;
            cursor: pointer;
        }

        .category-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 16px;
            margin: 10px 0;
            border-right: 4px solid;
        }

        .time-input-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .time-input {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            font-weight: bold;
        }

        .tab.active {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
            color: white;
        }

        .history-log {
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
        }

        canvas {
            max-height: 220px;
            width: 100%;
        }

        .category-stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .tab {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        .alert-warning {
            background: rgba(253, 203, 110, 0.15);
            border: 1px solid var(--warning);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-container" id="root"></div>

<script>
    // ====================== نظام تتبع الوقت ======================
    
    const STORAGE_KEY = 'time_tracker_pro_v1';
    const ADMIN_PASSWORD = '1234';
    
    let currentUser = null;
    let activeTab = 'daily';
    let currentLang = 'ar';
    let isLightMode = false;
    let charts = { pie: null, bar: null, line: null };
    
    // فئات الوقت الرئيسية
    const TIME_CATEGORIES = {
        ar: [
            { id: 'sleep', name: '😴 النوم', color: '#6c5ce7', icon: '😴', maxHours: 9 },
            { id: 'work', name: '💼 العمل/الدراسة', color: '#e84393', icon: '💼', maxHours: 10 },
            { id: 'exercise', name: '🏃‍♂️ الرياضة', color: '#00b894', icon: '🏃‍♂️', maxHours: 2 },
            { id: 'family', name: '👨‍👩‍👧 العائلة', color: '#fdcb6e', icon: '👨‍👩‍👧', maxHours: 4 },
            { id: 'leisure', name: '🎮 الترفيه', color: '#00cec9', icon: '🎮', maxHours: 4 },
            { id: 'selfCare', name: '🧘 العناية الذاتية', color: '#74b9ff', icon: '🧘', maxHours: 2 },
            { id: 'social', name: '👥 التواصل الاجتماعي', color: '#fd79a8', icon: '👥', maxHours: 3 },
            { id: 'transport', name: '🚗 المواصلات', color: '#d63031', icon: '🚗', maxHours: 2 },
            { id: 'eating', name: '🍽️ الأكل والراحة', color: '#e67e22', icon: '🍽️', maxHours: 2.5 },
            { id: 'other', name: '📝 أخرى', color: '#95a5a6', icon: '📝', maxHours: 2 }
        ],
        en: [
            { id: 'sleep', name: '😴 Sleep', color: '#6c5ce7', icon: '😴', maxHours: 9 },
            { id: 'work', name: '💼 Work/Study', color: '#e84393', icon: '💼', maxHours: 10 },
            { id: 'exercise', name: '🏃‍♂️ Exercise', color: '#00b894', icon: '🏃‍♂️', maxHours: 2 },
            { id: 'family', name: '👨‍👩‍👧 Family', color: '#fdcb6e', icon: '👨‍👩‍👧', maxHours: 4 },
            { id: 'leisure', name: '🎮 Leisure', color: '#00cec9', icon: '🎮', maxHours: 4 },
            { id: 'selfCare', name: '🧘 Self Care', color: '#74b9ff', icon: '🧘', maxHours: 2 },
            { id: 'social', name: '👥 Social', color: '#fd79a8', icon: '👥', maxHours: 3 },
            { id: 'transport', name: '🚗 Transport', color: '#d63031', icon: '🚗', maxHours: 2 },
            { id: 'eating', name: '🍽️ Eating/Rest', color: '#e67e22', icon: '🍽️', maxHours: 2.5 },
            { id: 'other', name: '📝 Other', color: '#95a5a6', icon: '📝', maxHours: 2 }
        ]
    };
    
    // الترجمة
    const translations = {
        ar: {
            appTitle: 'نظام تتبع الوقت الذكي',
            login: 'تسجيل الدخول',
            name: 'الاسم',
            startJourney: '🚀 بدء الرحلة',
            deleteAllData: '🗑️ حذف كل البيانات',
            passwordRequired: 'كلمة السر مطلوبة (1234)',
            timeBudget: 'ميزانية الوقت',
            daily: 'اليومي',
            monthly: 'الشهري',
            weekly: 'الأسبوعي',
            totalHours: 'إجمالي الساعات',
            remaining: 'المتبقي',
            used: 'المستخدم',
            addTime: 'إضافة وقت',
            recentEntries: 'آخر الإدخالات',
            category: 'الفئة',
            hours: 'ساعات',
            minutes: 'دقائق',
            cancel: 'إلغاء',
            submit: 'تسجيل',
            logout: 'خروج',
            theme: 'الوضع',
            noData: 'لا توجد بيانات',
            deleteConfirm: '⚠️ سيتم حذف جميع بياناتك نهائياً. أدخل كلمة السر 1234 للتأكيد',
            wrongPassword: 'كلمة السر غير صحيحة',
            dailyTarget: 'الهدف اليومي',
            monthlyTarget: 'الهدف الشهري',
            hoursPerDay: 'ساعة/يوم',
            monthlyBudget: 'ميزانية الشهر',
            timeDistribution: 'توزيع الوقت',
            weeklyAverage: 'المتوسط الأسبوعي',
            overBudget: 'تجاوز الميزانية',
            timeAnalysis: 'تحليل الوقت'
        },
        en: {
            appTitle: 'Smart Time Tracker',
            login: 'Login',
            name: 'Name',
            startJourney: '🚀 Start Journey',
            deleteAllData: '🗑️ Delete All Data',
            passwordRequired: 'Password required (1234)',
            timeBudget: 'Time Budget',
            daily: 'Daily',
            monthly: 'Monthly',
            weekly: 'Weekly',
            totalHours: 'Total Hours',
            remaining: 'Remaining',
            used: 'Used',
            addTime: 'Add Time',
            recentEntries: 'Recent Entries',
            category: 'Category',
            hours: 'Hours',
            minutes: 'Minutes',
            cancel: 'Cancel',
            submit: 'Submit',
            logout: 'Logout',
            theme: 'Theme',
            noData: 'No Data',
            deleteConfirm: '⚠️ All data will be permanently deleted. Enter password 1234 to confirm',
            wrongPassword: 'Wrong password',
            dailyTarget: 'Daily Target',
            monthlyTarget: 'Monthly Target',
            hoursPerDay: 'hours/day',
            monthlyBudget: 'Monthly Budget',
            timeDistribution: 'Time Distribution',
            weeklyAverage: 'Weekly Average',
            overBudget: 'Over Budget',
            timeAnalysis: 'Time Analysis'
        }
    };
    
    function t(key) {
        return translations[currentLang][key] || key;
    }
    
    function getCategories() {
        return currentLang === 'ar' ? TIME_CATEGORIES.ar : TIME_CATEGORIES.en;
    }
    
    function getTodayKey() { return new Date().toISOString().slice(0, 10); }
    function getCurrentWeekKey() { 
        const now = new Date();
        const firstDay = new Date(now.setDate(now.getDate() - now.getDay()));
        return firstDay.toISOString().slice(0, 10);
    }
    function getCurrentMonthKey() { return new Date().toISOString().slice(0, 7); }
    
    // حساب إجمالي الساعات اليومية
    function calculateDailyTotal(entries) {
        return entries.reduce((sum, e) => sum + e.hours, 0);
    }
    
    // إنشاء مستخدم جديد
    function createNewUser(userData) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        
        return {
            name: userData.name,
            createdAt: Date.now(),
            dailyLogs: {
                [today]: { entries: [], totalHours: 0, date: today }
            },
            weeklyLogs: {
                [week]: { entries: [], totalHours: 0, week: week }
            },
            monthlyLogs: {
                [month]: { entries: [], totalHours: 0, month: month }
            },
            totalStats: { totalEntries: 0, totalHours: 0, byCategory: {} },
            lastDateReset: today,
            lastWeekReset: week,
            lastMonthReset: month
        };
    }
    
    function loadAllUsers() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
    }
    
    function saveAllUsers(db) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }
    
    function checkAndResetDay(user) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        let changed = false;
        
        if (user.lastDateReset !== today) {
            if (!user.dailyLogs[today]) {
                user.dailyLogs[today] = { entries: [], totalHours: 0, date: today };
            }
            user.lastDateReset = today;
            changed = true;
        }
        
        if (user.lastWeekReset !== week) {
            if (!user.weeklyLogs[week]) {
                user.weeklyLogs[week] = { entries: [], totalHours: 0, week: week };
            }
            user.lastWeekReset = week;
            changed = true;
        }
        
        if (user.lastMonthReset !== month) {
            if (!user.monthlyLogs[month]) {
                user.monthlyLogs[month] = { entries: [], totalHours: 0, month: month };
            }
            user.lastMonthReset = month;
            changed = true;
        }
        
        return changed;
    }
    
    function getExistingUserByName(name) {
        const db = loadAllUsers();
        const normalizedName = name.trim().toLowerCase();
        if (db[normalizedName]) {
            let user = db[normalizedName];
            checkAndResetDay(user);
            saveAllUsers(db);
            return user;
        }
        return null;
    }
    
    function registerOrLogin(userData) {
        const db = loadAllUsers();
        const name = userData.name.trim().toLowerCase();
        
        if (!db[name]) {
            db[name] = createNewUser(userData);
        }
        
        let user = db[name];
        checkAndResetDay(user);
        db[name] = user;
        saveAllUsers(db);
        return user;
    }
    
    function persistUser(user) {
        const db = loadAllUsers();
        db[user.name.toLowerCase()] = user;
        saveAllUsers(db);
    }
    
    // إضافة وقت جديد
    function addTimeEntry(categoryId, hours, note, user) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        const categories = getCategories();
        const category = categories.find(c => c.id === categoryId);
        
        if (!category) return null;
        
        const entry = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            time: new Date().toLocaleTimeString(currentLang === 'ar' ? 'ar-EG' : 'en-US'),
            date: today,
            categoryId: categoryId,
            categoryName: category.name,
            hours: parseFloat(hours),
            note: note || '',
            icon: category.icon
        };
        
        // تحديث اليومي
        if (!user.dailyLogs[today]) {
            user.dailyLogs[today] = { entries: [], totalHours: 0, date: today };
        }
        user.dailyLogs[today].entries.push(entry);
        user.dailyLogs[today].totalHours = calculateDailyTotal(user.dailyLogs[today].entries);
        
        // تحديث الأسبوعي
        if (!user.weeklyLogs[week]) {
            user.weeklyLogs[week] = { entries: [], totalHours: 0, week: week };
        }
        user.weeklyLogs[week].entries.push(entry);
        user.weeklyLogs[week].totalHours += hours;
        
        // تحديث الشهري
        if (!user.monthlyLogs[month]) {
            user.monthlyLogs[month] = { entries: [], totalHours: 0, month: month };
        }
        user.monthlyLogs[month].entries.push(entry);
        user.monthlyLogs[month].totalHours += hours;
        
        // تحديث الإحصائيات الكلية
        user.totalStats.totalEntries++;
        user.totalStats.totalHours += hours;
        if (!user.totalStats.byCategory[categoryId]) {
            user.totalStats.byCategory[categoryId] = { name: category.name, hours: 0, entries: 0 };
        }
        user.totalStats.byCategory[categoryId].hours += hours;
        user.totalStats.byCategory[categoryId].entries++;
        
        persistUser(user);
        return entry;
    }
    
    function verifyPassword(callback) {
        const pwd = prompt(t('passwordRequired'));
        if (pwd === ADMIN_PASSWORD) callback(true);
        else { alert(t('wrongPassword')); callback(false); }
    }
    
    function logout() {
        verifyPassword((success) => {
            if (success) { currentUser = null; renderLoginScreen(); }
        });
    }
    
    function deleteAllUserData(name) {
        verifyPassword((success) => {
            if (success) {
                const db = loadAllUsers();
                delete db[name.toLowerCase()];
                saveAllUsers(db);
                alert('✅ تم حذف جميع البيانات');
                if (currentUser && currentUser.name.toLowerCase() === name.toLowerCase()) {
                    currentUser = null;
                    renderLoginScreen();
                } else {
                    renderLoginScreen();
                }
            }
        });
    }
    
    // عرض نموذج إضافة وقت
    function showAddTimeForm() {
        const categories = getCategories();
        const modalHtml = `
            <div id="timeModal" class="modal">
                <div class="modal-content">
                    <h3 style="color: var(--accent-secondary);">⏰ ${t('addTime')}</h3>
                    <div class="form-group">
                        <label>📂 ${t('category')}</label>
                        <select id="categorySelect" class="time-input" style="width:100%">
                            ${categories.map(cat => `<option value="${cat.id}">${cat.icon} ${cat.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⏱️ ${t('hours')}</label>
                        <input type="number" id="hoursInput" class="time-input" step="0.25" min="0" max="24" value="1" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label>📝 ${currentLang === 'ar' ? 'ملاحظة (اختياري)' : 'Note (optional)'}</label>
                        <input type="text" id="noteInput" class="time-input" style="width:100%">
                    </div>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button onclick="closeModal()" class="btn-action" style="background: var(--bg-secondary);">${t('cancel')}</button>
                        <button onclick="submitTimeEntry()" class="btn-action">${t('submit')}</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('dynamicModal')?.remove();
        const div = document.createElement('div');
        div.id = 'dynamicModal';
        div.innerHTML = modalHtml;
        document.body.appendChild(div);
    }
    
    window.closeModal = () => { document.getElementById('dynamicModal')?.remove(); renderMainApp(); };
    
    window.submitTimeEntry = () => {
        const categoryId = document.getElementById('categorySelect')?.value;
        const hours = parseFloat(document.getElementById('hoursInput')?.value || 0);
        const note = document.getElementById('noteInput')?.value || '';
        
        if (!categoryId || hours <= 0) {
            alert(currentLang === 'ar' ? 'الرجاء إدخال وقت صحيح' : 'Please enter a valid time');
            return;
        }
        
        const todayTotal = currentUser.dailyLogs[getTodayKey()]?.totalHours || 0;
        if (todayTotal + hours > 24) {
            alert(currentLang === 'ar' ? '⚠️ لا يمكن تجاوز 24 ساعة في اليوم الواحد!' : '⚠️ Cannot exceed 24 hours in a day!');
            return;
        }
        
        addTimeEntry(categoryId, hours, note, currentUser);
        closeModal();
        renderMainApp();
    };
    
    // عرض الإحصائيات
    function renderCharts(user) {
        const today = getTodayKey();
        const dailyEntries = user.dailyLogs[today]?.entries || [];
        const categories = getCategories();
        
        // Pie chart - توزيع وقت اليوم
        const categoryHours = {};
        dailyEntries.forEach(entry => {
            categoryHours[entry.categoryName] = (categoryHours[entry.categoryName] || 0) + entry.hours;
        });
        
        const pieCtx = document.getElementById('pieChart')?.getContext('2d');
        if (pieCtx) {
            if (charts.pie) charts.pie.destroy();
            charts.pie = new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(categoryHours),
                    datasets: [{ data: Object.values(categoryHours), backgroundColor: ['#4a9eff', '#6c5ce7', '#00b894', '#fdcb6e', '#e84393', '#00cec9', '#74b9ff', '#fd79a8', '#e67e22', '#95a5a6'] }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }
        
        // Bar chart - آخر 7 أيام
        const last7Days = [];
        const last7Hours = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0, 10);
            last7Days.push(dateStr.slice(5));
            const dayLog = user.dailyLogs[dateStr];
            const hours = dayLog?.totalHours || 0;
            last7Hours.push(hours);
        }
        
        const barCtx = document.getElementById('barChart')?.getContext('2d');
        if (barCtx) {
            if (charts.bar) charts.bar.destroy();
            charts.bar = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: last7Days,
                    datasets: [{ label: t('totalHours'), data: last7Hours, backgroundColor: '#4a9eff' }]
                },
                options: { responsive: true }
            });
        }
        
        // Line chart - متوسط الساعات
        const lineCtx = document.getElementById('lineChart')?.getContext('2d');
        if (lineCtx) {
            if (charts.line) charts.line.destroy();
            charts.line = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: last7Days,
                    datasets: [{ label: t('hoursPerDay'), data: last7Hours, borderColor: '#6c5ce7', fill: true, backgroundColor: 'rgba(108, 92, 231, 0.1)' }]
                },
                options: { responsive: true }
            });
        }
    }
    
    function renderMainApp() {
        if (!currentUser) return;
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        const week = getCurrentWeekKey();
        const todayLog = currentUser.dailyLogs[today] || { entries: [], totalHours: 0 };
        const monthLog = currentUser.monthlyLogs[month] || { totalHours: 0 };
        const weekLog = currentUser.weeklyLogs[week] || { totalHours: 0 };
        
        const remainingToday = 24 - todayLog.totalHours;
        const monthlyBudget = 24 * 30; // 720 ساعة في الشهر
        const remainingMonth = monthlyBudget - monthLog.totalHours;
        
        const html = `
            <div class="card">
                <div class="flex-between">
                    <div><span style="background:rgba(74,158,255,0.2); padding:8px 16px; border-radius:30px;">⏰ ${currentUser.name}</span></div>
                    <div class="lang-switch">
                        <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                        <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                        <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                        <button class="lang-btn" onclick="logout()">🚪 ${t('logout')}</button>
                    </div>
                </div>
                
                <div class="tabs">
                    <div class="tab ${activeTab === 'daily' ? 'active' : ''}" onclick="setTab('daily')">📅 ${t('daily')}</div>
                    <div class="tab ${activeTab === 'weekly' ? 'active' : ''}" onclick="setTab('weekly')">📊 ${t('weekly')}</div>
                    <div class="tab ${activeTab === 'monthly' ? 'active' : ''}" onclick="setTab('monthly')">📈 ${t('monthly')}</div>
                </div>
                
                <div id="tabContent"></div>
                
                <div class="charts-grid full-width">
                    <div class="chart-box"><canvas id="pieChart" height="180"></canvas></div>
                    <div class="chart-box"><canvas id="barChart" height="180"></canvas></div>
                    <div class="chart-box"><canvas id="lineChart" height="180"></canvas></div>
                </div>
            </div>
        `;
        
        document.getElementById('root').innerHTML = html;
        
        const tabContent = document.getElementById('tabContent');
        
        if (activeTab === 'daily') {
            const entries = [...(todayLog.entries || [])].reverse();
            tabContent.innerHTML = `
                <div class="time-budget-card card">
                    <h3>📅 ${t('daily')} - ${today}</h3>
                    <div class="flex-between">
                        <span>⏱️ ${t('totalHours')}:</span>
                        <span><strong>${todayLog.totalHours.toFixed(1)}</strong> / 24 ${t('hours')}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${(todayLog.totalHours / 24 * 100)}%;">${Math.round(todayLog.totalHours / 24 * 100)}%</div>
                    </div>
                    <div class="flex-between">
                        <span>✅ ${t('remaining')}:</span>
                        <span style="color: var(--success);">${remainingToday.toFixed(1)} ${t('hours')}</span>
                    </div>
                    ${remainingToday < 0 ? '<div class="alert-warning">⚠️ ' + (currentLang === 'ar' ? 'تجاوزت الميزانية اليومية!' : 'Daily budget exceeded!') + '</div>' : ''}
                    <button class="btn-action" onclick="showAddTimeForm()">➕ ${t('addTime')}</button>
                </div>
                
                <div class="card">
                    <h3>📋 ${t('recentEntries')}</h3>
                    <div class="history-log">
                        ${entries.length ? entries.map(e => `
                            <div style="background:var(--bg-primary); padding:12px; margin:8px 0; border-radius:16px; border-right: 4px solid ${getCategories().find(c => c.id === e.categoryId)?.color || '#4a9eff'}">
                                <div class="flex-between">
                                    <span><strong>${e.icon} ${e.categoryName}</strong></span>
                                    <span>⏱️ ${e.hours} ${t('hours')}</span>
                                </div>
                                <div style="font-size:12px; color:var(--text-secondary);">🕒 ${e.time} ${e.note ? `| 📝 ${e.note}` : ''}</div>
                            </div>
                        `).join('') : `<div style="text-align:center; padding:20px;">✨ ${t('noData')}</div>`}
                    </div>
                </div>
            `;
        } else if (activeTab === 'weekly') {
            const weekEntries = Object.values(currentUser.weeklyLogs).slice(-4).reverse();
            tabContent.innerHTML = `
                <div class="card">
                    <h3>📊 ${t('weekly')}</h3>
                    <div class="flex-between">
                        <span>🎯 ${t('weeklyAverage')}:</span>
                        <span><strong>${(weekLog.totalHours / 7).toFixed(1)}</strong> ${t('hoursPerDay')}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${Math.min(100, (weekLog.totalHours / (24 * 7) * 100))}%;">${Math.round(weekLog.totalHours / (24 * 7) * 100)}%</div>
                    </div>
                    ${weekEntries.map(week => `
                        <div class="category-card" style="border-right-color: var(--accent-primary); margin-top:12px;">
                            <div class="flex-between">
                                <span>📅 ${week.week}</span>
                                <span>⏱️ ${week.totalHours?.toFixed(1) || 0} ${t('hours')}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (activeTab === 'monthly') {
            const monthlyBudget = 24 * 30;
            tabContent.innerHTML = `
                <div class="card">
                    <h3>📈 ${t('monthly')} - ${month}</h3>
                    <div class="flex-between">
                        <span>💰 ${t('monthlyBudget')}:</span>
                        <span><strong>${monthlyBudget}</strong> ${t('hours')}</span>
                    </div>
                    <div class="flex-between">
                        <span>⚡ ${t('used')}:</span>
                        <span><strong>${monthLog.totalHours?.toFixed(1) || 0}</strong> ${t('hours')}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${((monthLog.totalHours || 0) / monthlyBudget * 100)}%;">${Math.round((monthLog.totalHours || 0) / monthlyBudget * 100)}%</div>
                    </div>
                    <div class="flex-between">
                        <span>✅ ${t('remaining')}:</span>
                        <span style="color: var(--success);">${(monthlyBudget - (monthLog.totalHours || 0)).toFixed(1)} ${t('hours')}</span>
                    </div>
                    ${(monthLog.totalHours || 0) > monthlyBudget ? '<div class="alert-warning">⚠️ ' + (currentLang === 'ar' ? 'تجاوزت الميزانية الشهرية!' : 'Monthly budget exceeded!') + '</div>' : ''}
                    <button class="btn-action btn-secondary" onclick="deleteAllUserData('${currentUser.name}')" style="margin-top:20px;">🗑️ ${t('deleteAllData')}</button>
                </div>
                
                <div class="card">
                    <h3>📊 ${t('timeDistribution')}</h3>
                    ${Object.entries(currentUser.totalStats.byCategory || {}).map(([id, data]) => {
                        const category = getCategories().find(c => c.id === id);
                        const percentage = (data.hours / currentUser.totalStats.totalHours * 100).toFixed(1);
                        return `
                            <div class="category-stats">
                                <span>${category?.icon || '📌'} ${data.name}</span>
                                <span>${data.hours.toFixed(1)} ${t('hours')} (${percentage}%)</span>
                            </div>
                        `;
                    }).join('')}
                    ${Object.keys(currentUser.totalStats.byCategory || {}).length === 0 ? `<div style="text-align:center;">✨ ${t('noData')}</div>` : ''}
                    <div class="category-stats" style="border-top: 2px solid var(--border-color); margin-top:12px; padding-top:12px; font-weight:bold;">
                        <span>📊 ${t('totalHours')}</span>
                        <span>${currentUser.totalStats.totalHours?.toFixed(1) || 0} ${t('hours')}</span>
                    </div>
                </div>
            `;
        }
        
        setTimeout(() => renderCharts(currentUser), 100);
    }
    
    function renderLoginScreen() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="login-screen" style="max-width:500px; margin:0 auto;">
                <div style="font-size:48px; text-align:center;">⏰⚡</div>
                <h2>${t('appTitle')}</h2>
                <div class="lang-switch" style="justify-content:center; margin-bottom:20px;">
                    <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                    <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                    <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                </div>
                <div class="form-group">
                    <label>👤 ${t('name')}</label>
                    <input type="text" id="name" class="login-input" placeholder="${currentLang === 'ar' ? 'أدخل اسمك' : 'Enter your name'}">
                </div>
                <button id="registerBtn" class="login-btn">${t('startJourney')}</button>
                <button id="deleteAllBtn" class="login-btn btn-danger" style="margin-top:12px;">🗑️ ${t('deleteAllData')}</button>
            </div>
        `;
        
        document.getElementById('registerBtn').onclick = () => {
            const name = document.getElementById('name').value.trim();
            if (!name) { alert(currentLang === 'ar' ? 'الرجاء إدخال الاسم' : 'Please enter your name'); return; }
            currentUser = registerOrLogin({ name });
            renderMainApp();
        };
        document.getElementById('deleteAllBtn').onclick = () => {
            const name = document.getElementById('name').value.trim();
            if (name) deleteAllUserData(name);
            else alert(currentLang === 'ar' ? 'أدخل الاسم لحذف البيانات' : 'Enter name to delete data');
        };
    }
    
    window.setTab = (tab) => { activeTab = tab; renderMainApp(); };
    window.setLang = (lang) => { currentLang = lang; if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.toggleTheme = () => { isLightMode = !isLightMode; document.body.classList.toggle('light-mode', isLightMode); if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.deleteAllUserData = deleteAllUserData;
    window.logout = logout;
    window.showAddTimeForm = showAddTimeForm;
    
    // التحقق من وجود مستخدم محفوظ
    const savedUsers = loadAllUsers();
    const lastUserName = localStorage.getItem('last_logged_in_name');
    if (lastUserName && savedUsers[lastUserName.toLowerCase()]) {
        currentUser = savedUsers[lastUserName.toLowerCase()];
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        renderMainApp();
    } else {
        renderLoginScreen();
    }
    
    // حفظ آخر اسم مسجل دخول
    const originalRegister = registerOrLogin;
    window.registerOrLogin = function(userData) {
        const user = originalRegister(userData);
        localStorage.setItem('last_logged_in_name', user.name);
        return user;
    };
</script>
</body>
</html>
