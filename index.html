<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام إدارة الوقت الذكي | Smart Time Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-card: rgba(18, 18, 24, 0.98);
            --border-color: #2a2a35;
            --accent-primary: #4a9eff;
            --accent-secondary: #6c5ce7;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a8;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #ff7675;
            --info: #74b9ff;
            --sleep: #6c5ce7;
            --work: #e84393;
            --leisure: #00cec9;
        }

        body.light-mode {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.98);
            --border-color: #e0e0e5;
            --text-primary: #1a1a1f;
            --text-secondary: #5a5a6a;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            .full-width {
                grid-column: span 2;
            }
            body {
                padding: 30px;
            }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 48px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--accent-primary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .profile-image-container {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-primary);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-image:hover {
            transform: scale(1.05);
        }

        .profile-image-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            margin: 0 auto;
            transition: transform 0.3s;
        }

        .profile-image-placeholder:hover {
            transform: scale(1.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--accent-secondary);
            font-weight: bold;
        }

        .login-input, .form-select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 60px;
            color: var(--text-primary);
            font-size: 15px;
            transition: 0.2s;
        }

        .login-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .login-btn {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 158, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(95deg, #ff7675, #d63031);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-color);
            font-weight: bold;
        }

        .tab.active {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
            color: white;
        }

        .progress-container {
            background: var(--border-color);
            height: 25px;
            border-radius: 40px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.5s;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-action {
            background: linear-gradient(95deg, var(--accent-primary), var(--accent-secondary));
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            margin: 12px 0;
            cursor: pointer;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
            margin: 0;
        }

        .category-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 16px;
            margin: 10px 0;
            border-right: 4px solid;
        }

        .history-log {
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }

        .entry-item {
            background: var(--bg-primary);
            padding: 12px;
            margin: 8px 0;
            border-radius: 16px;
            position: relative;
        }

        .delete-entry {
            position: absolute;
            left: 12px;
            top: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 11px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 16px;
        }

        canvas {
            max-height: 220px;
            width: 100%;
        }

        .requirement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .requirement-check {
            color: var(--success);
            font-size: 20px;
        }

        .requirement-uncheck {
            color: var(--danger);
            font-size: 20px;
        }

        .vacation-day {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 12px;
            margin: 5px;
            display: inline-block;
            cursor: pointer;
        }

        .vacation-day.selected {
            background: var(--accent-primary);
            color: white;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .tab {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

            { id: 'meals', name: '🍽️ Meals', color: '#fdcb6e', icon: '🍽️', defaultHours: 2 },
            { id: 'bathroom', name: '🚽 Bathroom', color: '#74b9ff', icon: '🚽', defaultHours: 0.5 },
            { id: 'exercise', name: '🏃‍♂️ Exercise', color: '#00b894', icon: '🏃‍♂️', defaultHours: 1 },
            { id: 'family', name: '👨‍👩‍👧 Family', color: '#fd79a8', icon: '👨‍👩‍👧', defaultHours: 2 },
            { id: 'leisure', name: '🎮 Leisure', color: '#00cec9', icon: '🎮', defaultHours: 2 },
            { id: 'selfCare', name: '🧘 Self Care', color: '#e67e22', icon: '🧘', defaultHours: 1 },
            { id: 'social', name: '👥 Social', color: '#95a5a6', icon: '👥', defaultHours: 1 },
            { id: 'transport', name: '🚗 Transport', color: '#d63031', icon: '🚗', defaultHours: 1.5 },
            { id: 'other', name: '📝 Other', color: '#95a5a6', icon: '📝', defaultHours: 1 }
        ]
    };
    
    const translations = {
        ar: {
            appTitle: 'نظام إدارة الوقت الذكي',
            login: 'تسجيل الدخول',

            email: 'البريد الإلكتروني',
            startJourney: '🚀 ابدأ الرحلة',
            deleteAllData: '🗑️ حذف كل البيانات',
            passwordRequired: 'كلمة السر مطلوبة (1234)',
            timeBudget: 'ميزانية الوقت',

            minutes: 'دقائق',
            cancel: 'إلغاء',
            submit: 'تسجيل',
            logout: 'خروج',
            theme: 'الوضع',
            noData: 'لا توجد بيانات',
            deleteConfirm: '⚠️ سيتم حذف جميع بياناتك نهائياً. أدخل كلمة السر 1234 للتأكيد',
            wrongPassword: 'كلمة السر غير صحيحة',
            dailyRequirements: '✅ المتطلبات اليومية',
            sleepRequirement: '😴 النوم (8 ساعات)',
            mealsRequirement: '🍽️ الوجبات (فطور، غداء، عشاء)',
            bathroomRequirement: '🚽 الحمام (4 مرات على الأقل)',
            workRequirement: '💼 العمل (8 ساعات، 6 أيام بالأسبوع)',
            vacationDays: '🏖️ أيام العطلة',
            selectVacation: 'اختر أيام العطلة',
            estimatedTime: 'الوقت التقديري المتبقي',
            profileImage: 'صورة الملف الشخصي',
            changeImage: 'تغيير الصورة',
            deleteEntry: 'حذف',
            weeklyProgress: 'تقدم الأسبوع',
            monthlyTarget: 'الهدف الشهري'
        },
        en: {
            appTitle: 'Smart Time Manager',
            login: 'Login',
            name: 'Name',
            email: 'Email',
            startJourney: '🚀 Start Journey',
            deleteAllData: '🗑️ Delete All Data',
            passwordRequired: 'Password required (1234)',
            timeBudget: 'Time Budget',
            daily: 'Daily',
            monthly: 'Monthly',
            requirements: 'Requirements',
            totalHours: 'Total Hours',
            remaining: 'Remaining',
            used: 'Used',
            addTime: 'Add Time',
            recentEntries: 'Recent Entries',
            category: 'Category',
            hours: 'Hours',
            minutes: 'Minutes',
            cancel: 'Cancel',
            submit: 'Submit',
            logout: 'Logout',
            theme: 'Theme',
            noData: 'No Data',
            deleteConfirm: '⚠️ All data will be permanently deleted. Enter password 1234 to confirm',
            wrongPassword: 'Wrong password',
            dailyRequirements: '✅ Daily Requirements',
            sleepRequirement: '😴 Sleep (8 hours)',
            mealsRequirement: '🍽️ Meals (Breakfast, Lunch, Dinner)',
            bathroomRequirement: '🚽 Bathroom (4 times minimum)',
            workRequirement: '💼 Work (8 hours, 6 days/week)',
            vacationDays: '🏖️ Vacation Days',
            selectVacation: 'Select vacation days',
            estimatedTime: 'Estimated Remaining Time',
            profileImage: 'Profile Image',
            changeImage: 'Change Image',
            deleteEntry: 'Delete',
            weeklyProgress: 'Weekly Progress',
            monthlyTarget: 'Monthly Target'
        }
    };
    
    function t(key) { return translations[currentLang][key] || key; }
    function getCategories() { return currentLang === 'ar' ? TIME_CATEGORIES.ar : TIME_CATEGORIES.en; }
    function getTodayKey() { return new Date().toISOString().slice(0, 10); }
    function getCurrentWeekKey() { const now = new Date(); const firstDay = new Date(now.setDate(now.getDate() - now.getDay())); return firstDay.toISOString().slice(0, 10); }
    function getCurrentMonthKey() { return new Date().toISOString().slice(0, 7); }
    
    function calculateDailyTotal(entries) { return entries.reduce((sum, e) => sum + e.hours, 0); }
    
    function createNewUser(userData) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        
        return {
            name: userData.name,
            email: userData.email,
            profileImage: userData.profileImage || null,
            vacationDays: [],
            createdAt: Date.now(),
            dailyLogs: { [today]: { entries: [], totalHours: 0, date: today, meals: { breakfast: false, lunch: false, dinner: false }, bathroomCount: 0, workHours: 0 } },
            weeklyLogs: { [week]: { entries: [], totalHours: 0, week: week, workDays: 0 } },
            monthlyLogs: { [month]: { entries: [], totalHours: 0, month: month } },
            totalStats: { totalEntries: 0, totalHours: 0, byCategory: {} },
            lastDateReset: today,
            lastWeekReset: week,
            lastMonthReset: month
        };
    }
    
    function loadAllUsers() { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }
    function saveAllUsers(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
    
    function checkAndResetDay(user) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        let changed = false;
        
        if (user.lastDateReset !== today) {
            if (!user.dailyLogs[today]) {
                user.dailyLogs[today] = { entries: [], totalHours: 0, date: today, meals: { breakfast: false, lunch: false, dinner: false }, bathroomCount: 0, workHours: 0 };
            }
            user.lastDateReset = today;
            changed = true;
        }
        
        if (user.lastWeekReset !== week) {
            if (!user.weeklyLogs[week]) {
                user.weeklyLogs[week] = { entries: [], totalHours: 0, week: week, workDays: 0 };
            }
            user.lastWeekReset = week;
            changed = true;
        }
        
        if (user.lastMonthReset !== month) {
            if (!user.monthlyLogs[month]) {
                user.monthlyLogs[month] = { entries: [], totalHours: 0, month: month };
            }
            user.lastMonthReset = month;
            changed = true;
        }
        
        return changed;
    }
    
    function getExistingUserByEmail(email) {
        const db = loadAllUsers();
        const normalizedEmail = email.trim().toLowerCase();
        for (let key in db) {
            if (db[key].email === normalizedEmail) {
                let user = db[key];
                checkAndResetDay(user);
                saveAllUsers(db);
                return user;
            }
        }
        return null;
    }
    
    function registerOrLogin(userData) {
        const db = loadAllUsers();
        const email = userData.email.trim().toLowerCase();
        let existingUser = null;
        
        for (let key in db) {
            if (db[key].email === email) {
                existingUser = db[key];
                break;
            }
        }
        
        if (!existingUser) {
            const newUser = createNewUser(userData);
            db[newUser.name.toLowerCase() + '_' + Date.now()] = newUser;
            existingUser = newUser;
        }
        
        let user = existingUser;
        checkAndResetDay(user);
        saveAllUsers(db);
        return user;
    }
    
    function persistUser(user) {
        const db = loadAllUsers();
        for (let key in db) {
            if (db[key].email === user.email) {
                db[key] = user;
                break;
            }
        }
        saveAllUsers(db);
    }
    
    function addTimeEntry(categoryId, hours, note, user) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        const categories = getCategories();
        const category = categories.find(c => c.id === categoryId);
        
        if (!category) return null;
        
        const entry = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            time: new Date().toLocaleTimeString(currentLang === 'ar' ? 'ar-EG' : 'en-US'),
            date: today,
            categoryId: categoryId,
            categoryName: category.name,
            hours: parseFloat(hours),
            note: note || '',
            icon: category.icon
        };
        
        // تحديث اليومي
        if (!user.dailyLogs[today]) {
            user.dailyLogs[today] = { entries: [], totalHours: 0, date: today, meals: { breakfast: false, lunch: false, dinner: false }, bathroomCount: 0, workHours: 0 };
        }
        user.dailyLogs[today].entries.push(entry);
        user.dailyLogs[today].totalHours = calculateDailyTotal(user.dailyLogs[today].entries);
        
        // تحديث إحصائيات خاصة
        if (categoryId === 'work') {
            user.dailyLogs[today].workHours += hours;
        }
        if (categoryId === 'bathroom') {
            user.dailyLogs[today].bathroomCount++;
        }
        
        // تحديث الأسبوعي
        if (!user.weeklyLogs[week]) {
            user.weeklyLogs[week] = { entries: [], totalHours: 0, week: week, workDays: 0 };
        }
        user.weeklyLogs[week].entries.push(entry);
        user.weeklyLogs[week].totalHours += hours;
        if (categoryId === 'work' && hours >= 8) {
            user.weeklyLogs[week].workDays++;
        }
        
        // تحديث الشهري
        if (!user.monthlyLogs[month]) {
            user.monthlyLogs[month] = { entries: [], totalHours: 0, month: month };
        }
        user.monthlyLogs[month].entries.push(entry);
        user.monthlyLogs[month].totalHours += hours;
        
        // تحديث الإحصائيات الكلية
        user.totalStats.totalEntries++;
        user.totalStats.totalHours += hours;
        if (!user.totalStats.byCategory[categoryId]) {
            user.totalStats.byCategory[categoryId] = { name: category.name, hours: 0, entries: 0 };
        }
        user.totalStats.byCategory[categoryId].hours += hours;
        user.totalStats.byCategory[categoryId].entries++;
        
        persistUser(user);
        return entry;
    }
    
    function deleteTimeEntry(entryId, user) {
        const today = getTodayKey();
        const week = getCurrentWeekKey();
        const month = getCurrentMonthKey();
        
        let deletedEntry = null;
        
        // حذف من اليومي
        if (user.dailyLogs[today]) {
            const index = user.dailyLogs[today].entries.findIndex(e => e.id === entryId);
            if (index !== -1) {
                deletedEntry = user.dailyLogs[today].entries[index];
                user.dailyLogs[today].entries.splice(index, 1);
                user.dailyLogs[today].totalHours = calculateDailyTotal(user.dailyLogs[today].entries);
            }
        }
        
        if (deletedEntry) {
            // حذف من الأسبوعي
            if (user.weeklyLogs[week]) {
                const weekIndex = user.weeklyLogs[week].entries.findIndex(e => e.id === entryId);
                if (weekIndex !== -1) {
                    user.weeklyLogs[week].entries.splice(weekIndex, 1);
                    user.weeklyLogs[week].totalHours -= deletedEntry.hours;
                }
            }
            
            // حذف من الشهري
            if (user.monthlyLogs[month]) {
                const monthIndex = user.monthlyLogs[month].entries.findIndex(e => e.id === entryId);
                if (monthIndex !== -1) {
                    user.monthlyLogs[month].entries.splice(monthIndex, 1);
                    user.monthlyLogs[month].totalHours -= deletedEntry.hours;
                }
            }
            
            // تحديث الإحصائيات الكلية
            user.totalStats.totalEntries--;
            user.totalStats.totalHours -= deletedEntry.hours;
            if (user.totalStats.byCategory[deletedEntry.categoryId]) {
                user.totalStats.byCategory[deletedEntry.categoryId].hours -= deletedEntry.hours;
                user.totalStats.byCategory[deletedEntry.categoryId].entries--;
            }
            
            persistUser(user);
        }
        
        return deletedEntry;
    }
    
    function updateMeal(mealType, user) {
        const today = getTodayKey();
        if (!user.dailyLogs[today]) {
            user.dailyLogs[today] = { entries: [], totalHours: 0, date: today, meals: { breakfast: false, lunch: false, dinner: false }, bathroomCount: 0, workHours: 0 };
        }
        user.dailyLogs[today].meals[mealType] = !user.dailyLogs[today].meals[mealType];
        persistUser(user);
        renderMainApp();
    }
    
    function toggleVacationDay(day, user) {
        const index = user.vacationDays.indexOf(day);
        if (index === -1) {
            user.vacationDays.push(day);
        } else {
            user.vacationDays.splice(index, 1);
        }
        persistUser(user);
        renderMainApp();
    }
    
    function verifyPassword(callback) {
        const pwd = prompt(t('passwordRequired'));
        if (pwd === ADMIN_PASSWORD) callback(true);
        else { alert(t('wrongPassword')); callback(false); }
    }
    
    function logout() {
        verifyPassword((success) => {
            if (success) { currentUser = null; renderLoginScreen(); }
        });
    }
    
    function deleteAllUserData(email) {
        verifyPassword((success) => {
            if (success) {
                const db = loadAllUsers();
                for (let key in db) {
                    if (db[key].email === email) {
                        delete db[key];
                        break;
                    }
                }
                saveAllUsers(db);
                alert('✅ تم حذف جميع البيانات');
                if (currentUser && currentUser.email === email) {
                    currentUser = null;
                    renderLoginScreen();
                }
            }
        });
    }
    
    function showAddTimeForm() {
        const categories = getCategories();
        const modalHtml = `
            <div id="timeModal" class="modal">
                <div class="modal-content">
                    <h3 style="color: var(--accent-secondary);">⏰ ${t('addTime')}</h3>
                    <div class="form-group">
                        <label>📂 ${t('category')}</label>
                        <select id="categorySelect" class="login-input" style="width:100%">
                            ${categories.map(cat => `<option value="${cat.id}">${cat.icon} ${cat.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⏱️ ${t('hours')}</label>
                        <input type="number" id="hoursInput" class="login-input" step="0.25" min="0" max="24" value="1" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label>📝 ${currentLang === 'ar' ? 'ملاحظة (اختياري)' : 'Note (optional)'}</label>
                        <input type="text" id="noteInput" class="login-input" style="width:100%">
                    </div>
                    <div style="display:flex; gap:12px; margin-top:20px;">
                        <button onclick="closeModal()" class="login-btn btn-secondary">${t('cancel')}</button>
                        <button onclick="submitTimeEntry()" class="login-btn">${t('submit')}</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('dynamicModal')?.remove();
        const div = document.createElement('div');
        div.id = 'dynamicModal';
        div.innerHTML = modalHtml;
        document.body.appendChild(div);
    }
    
    window.closeModal = () => { document.getElementById('dynamicModal')?.remove(); renderMainApp(); };
    window.submitTimeEntry = () => {
        const categoryId = document.getElementById('categorySelect')?.value;
        const hours = parseFloat(document.getElementById('hoursInput')?.value || 0);
        const note = document.getElementById('noteInput')?.value || '';
        
        if (!categoryId || hours <= 0) {
            alert(currentLang === 'ar' ? 'الرجاء إدخال وقت صحيح' : 'Please enter a valid time');
            return;
        }
        
        const todayTotal = currentUser.dailyLogs[getTodayKey()]?.totalHours || 0;
        if (todayTotal + hours > 24) {
            alert(currentLang === 'ar' ? '⚠️ لا يمكن تجاوز 24 ساعة في اليوم الواحد!' : '⚠️ Cannot exceed 24 hours in a day!');
            return;
        }
        
        addTimeEntry(categoryId, hours, note, currentUser);
        closeModal();
        renderMainApp();
    };
    window.deleteEntry = (entryId) => {
        if (confirm(currentLang === 'ar' ? 'هل تريد حذف هذا الإدخال؟' : 'Do you want to delete this entry?')) {
            deleteTimeEntry(entryId, currentUser);
            renderMainApp();
        }
    };
    window.updateMeal = (mealType) => updateMeal(mealType, currentUser);
    window.toggleVacationDay = (day) => toggleVacationDay(day, currentUser);
    
    function renderCharts(user) {
        const today = getTodayKey();
        const dailyEntries = user.dailyLogs[today]?.entries || [];
        const categories = getCategories();
        
        const categoryHours = {};
        dailyEntries.forEach(entry => { categoryHours[entry.categoryName] = (categoryHours[entry.categoryName] || 0) + entry.hours; });
        
        const pieCtx = document.getElementById('pieChart')?.getContext('2d');
        if (pieCtx) {
            if (charts.pie) charts.pie.destroy();
            charts.pie = new Chart(pieCtx, { type: 'pie', data: { labels: Object.keys(categoryHours), datasets: [{ data: Object.values(categoryHours), backgroundColor: ['#4a9eff', '#6c5ce7', '#00b894', '#fdcb6e', '#e84393', '#00cec9', '#74b9ff', '#fd79a8', '#e67e22', '#95a5a6'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
        }
        
        const last7Days = []; const last7Hours = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0, 10);
            last7Days.push(dateStr.slice(5));
            const dayLog = user.dailyLogs[dateStr];
            last7Hours.push(dayLog?.totalHours || 0);
        }
        
        const barCtx = document.getElementById('barChart')?.getContext('2d');
        if (barCtx) {
            if (charts.bar) charts.bar.destroy();
            charts.bar = new Chart(barCtx, { type: 'bar', data: { labels: last7Days, datasets: [{ label: t('totalHours'), data: last7Hours, backgroundColor: '#4a9eff' }] }, options: { responsive: true } });
        }
        
        const lineCtx = document.getElementById('lineChart')?.getContext('2d');
        if (lineCtx) {
            if (charts.line) charts.line.destroy();
            charts.line = new Chart(lineCtx, { type: 'line', data: { labels: last7Days, datasets: [{ label: t('hoursPerDay'), data: last7Hours, borderColor: '#6c5ce7', fill: true, backgroundColor: 'rgba(108, 92, 231, 0.1)' }] }, options: { responsive: true } });
        }
    }
    
    function renderMainApp() {
        if (!currentUser) return;
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        
        const today = getTodayKey();
        const month = getCurrentMonthKey();
        const week = getCurrentWeekKey();
        const todayLog = currentUser.dailyLogs[today] || { entries: [], totalHours: 0, meals: { breakfast: false, lunch: false, dinner: false }, bathroomCount: 0, workHours: 0 };
        const weekLog = currentUser.weeklyLogs[week] || { totalHours: 0, workDays: 0 };
        const remainingToday = 24 - todayLog.totalHours;
        const estimatedRemaining = remainingToday - 8 - 2 - 0.5; // نوم + وجبات + حمام
        
        const weekDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const weekDaysEn = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const days = currentLang === 'ar' ? weekDays : weekDaysEn;
        
        const html = `
            <div class="app-container">
                <div class="card">
                    <div class="flex-between">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            ${currentUser.profileImage ? 
                                `<img src="${currentUser.profileImage}" class="profile-image" style="width: 50px; height: 50px;" onclick="changeProfileImage()">` :
                                `<div class="profile-image-placeholder" style="width: 50px; height: 50px; font-size: 24px;" onclick="changeProfileImage()">👤</div>`
                            }
                            <div><span style="background:rgba(74,158,255,0.2); padding:8px 16px; border-radius:30px;">⏰ ${currentUser.name}</span></div>
                        </div>
                        <div class="lang-switch">
                            <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                            <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                            <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                            <button class="lang-btn" onclick="logout()">🚪 ${t('logout')}</button>
                        </div>
                    </div>
                    
                    <div class="tabs">
                        <div class="tab ${activeTab === 'daily' ? 'active' : ''}" onclick="setTab('daily')">📅 ${t('daily')}</div>
                        <div class="tab ${activeTab === 'requirements' ? 'active' : ''}" onclick="setTab('requirements')">✅ ${t('requirements')}</div>
                        <div class="tab ${activeTab === 'monthly' ? 'active' : ''}" onclick="setTab('monthly')">📈 ${t('monthly')}</div>
                    </div>
                    
                    <div id="tabContent"></div>
                    
                    <div class="charts-grid full-width">
                        <div class="chart-box"><canvas id="pieChart" height="180"></canvas></div>
                        <div class="chart-box"><canvas id="barChart" height="180"></canvas></div>
                        <div class="chart-box"><canvas id="lineChart" height="180"></canvas></div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('root').innerHTML = html;
        
        const tabContent = document.getElementById('tabContent');
        
        if (activeTab === 'daily') {
            const entries = [...(todayLog.entries || [])].reverse();
            tabContent.innerHTML = `
                <div class="time-budget-card card">
                    <h3>📅 ${t('daily')} - ${today}</h3>
                    <div class="flex-between">
                        <span>⏱️ ${t('totalHours')}:</span>
                        <span><strong>${todayLog.totalHours.toFixed(1)}</strong> / 24 ${t('hours')}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${(todayLog.totalHours / 24 * 100)}%;">${Math.round(todayLog.totalHours / 24 * 100)}%</div>
                    </div>
                    <div class="flex-between">
                        <span>✅ ${t('remaining')}:</span>
                        <span style="color: var(--success);">${remainingToday.toFixed(1)} ${t('hours')}</span>
                    </div>
                    <div class="flex-between">
                        <span>🎯 ${t('estimatedTime')}:</span>
                        <span style="color: var(--warning);">${estimatedRemaining.toFixed(1)} ${t('hours')}</span>
                    </div>
                    <button class="btn-action" onclick="showAddTimeForm()">➕ ${t('addTime')}</button>
                </div>
                
                <div class="card">
                    <h3>📋 ${t('recentEntries')}</h3>
                    <div class="history-log">
                        ${entries.length ? entries.map(e => `
                            <div class="entry-item">
                                <div class="flex-between">
                                    <span><strong>${e.icon} ${e.categoryName}</strong></span>
                                    <span>⏱️ ${e.hours} ${t('hours')}</span>
                                </div>
                                <div style="font-size:12px; color:var(--text-secondary); margin-top: 5px;">🕒 ${e.time} ${e.note ? `| 📝 ${e.note}` : ''}</div>
                                <button class="delete-entry" onclick="deleteEntry(${e.id})">🗑️ ${t('deleteEntry')}</button>
                            </div>
                        `).join('') : `<div style="text-align:center; padding:20px;">✨ ${t('noData')}</div>`}
                    </div>
                </div>
            `;
        } else if (activeTab === 'requirements') {
            const workRequirementMet = weekLog.workDays >= 6;
            const bathroomMet = (todayLog.bathroomCount || 0) >= 4;
            const mealsMet = todayLog.meals.breakfast && todayLog.meals.lunch && todayLog.meals.dinner;
            const sleepHours = todayLog.entries.filter(e => e.categoryId === 'sleep').reduce((s, e) => s + e.hours, 0);
            const sleepMet = sleepHours >= 8;
            
            tabContent.innerHTML = `
                <div class="card">
                    <h3>✅ ${t('dailyRequirements')}</h3>
                    <div class="requirement-item">
                        <span>${t('sleepRequirement')}</span>
                        <span class="${sleepMet ? 'requirement-check' : 'requirement-uncheck'}">${sleepMet ? '✅' : '❌'} (${sleepHours.toFixed(1)}/${8} ${t('hours')})</span>
                    </div>
                    <div class="requirement-item">
                        <span>${t('mealsRequirement')}</span>
                        <div>
                            <button class="btn-small btn-action" style="display:inline-block; width:auto; margin:0 5px; padding:5px 10px;" onclick="updateMeal('breakfast')">🍳 فطور ${todayLog.meals.breakfast ? '✅' : '❌'}</button>
                            <button class="btn-small btn-action" style="display:inline-block; width:auto; margin:0 5px; padding:5px 10px;" onclick="updateMeal('lunch')">🍲 غداء ${todayLog.meals.lunch ? '✅' : '❌'}</button>
                            <button class="btn-small btn-action" style="display:inline-block; width:auto; margin:0 5px; padding:5px 10px;" onclick="updateMeal('dinner')">🍽️ عشاء ${todayLog.meals.dinner ? '✅' : '❌'}</button>
                        </div>
                    </div>
                    <div class="requirement-item">
                        <span>${t('bathroomRequirement')}</span>
                        <span class="${bathroomMet ? 'requirement-check' : 'requirement-uncheck'}">${bathroomMet ? '✅' : '❌'} (${todayLog.bathroomCount || 0}/4)</span>
                    </div>
                    <div class="requirement-item">
                        <span>${t('workRequirement')}</span>
                        <span class="${workRequirementMet ? 'requirement-check' : 'requirement-uncheck'}">${workRequirementMet ? '✅' : '❌'} (${weekLog.workDays || 0}/6 أيام)</span>
                    </div>
                </div>
                
                <div class="card">
                    <h3>🏖️ ${t('vacationDays')}</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
                        ${days.map((day, i) => `
                            <div class="vacation-day ${currentUser.vacationDays?.includes(day) ? 'selected' : ''}" onclick="toggleVacationDay('${day}')">
                                ${day}
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-between" style="margin-top: 15px;">
                        <span>🎯 ${t('weeklyProgress')}:</span>
                        <span>${weekLog.workDays || 0}/6 أيام عمل</span>
                    </div>
                </div>
            `;
        } else if (activeTab === 'monthly') {
            const monthlyBudget = 24 * 30;
            const monthLog = currentUser.monthlyLogs[getCurrentMonthKey()] || { totalHours: 0 };
            
            tabContent.innerHTML = `
                <div class="card">
                    <h3>📈 ${t('monthly')} - ${getCurrentMonthKey()}</h3>
                    <div class="flex-between">
                        <span>💰 ${t('monthlyTarget')}:</span>
                        <span><strong>${monthlyBudget}</strong> ${t('hours')}</span>
                    </div>
                    <div class="flex-between">
                        <span>⚡ ${t('used')}:</span>
                        <span><strong>${monthLog.totalHours?.toFixed(1) || 0}</strong> ${t('hours')}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${((monthLog.totalHours || 0) / monthlyBudget * 100)}%;">${Math.round((monthLog.totalHours || 0) / monthlyBudget * 100)}%</div>
                    </div>
                    <div class="flex-between">
                        <span>✅ ${t('remaining')}:</span>
                        <span style="color: var(--success);">${(monthlyBudget - (monthLog.totalHours || 0)).toFixed(1)} ${t('hours')}</span>
                    </div>
                    <button class="btn-action btn-secondary" onclick="deleteAllUserData('${currentUser.email}')" style="margin-top:20px;">🗑️ ${t('deleteAllData')}</button>
                </div>
                
                <div class="card">
                    <h3>📊 ${t('timeDistribution')}</h3>
                    ${Object.entries(currentUser.totalStats.byCategory || {}).map(([id, data]) => {
                        const category = getCategories().find(c => c.id === id);
                        const percentage = (data.hours / currentUser.totalStats.totalHours * 100).toFixed(1);
                        return `<div class="category-stats"><span>${category?.icon || '📌'} ${data.name}</span><span>${data.hours.toFixed(1)} ${t('hours')} (${percentage}%)</span></div>`;
                    }).join('')}
                    ${Object.keys(currentUser.totalStats.byCategory || {}).length === 0 ? `<div style="text-align:center;">✨ ${t('noData')}</div>` : ''}
                </div>
            `;
        }
        
        setTimeout(() => renderCharts(currentUser), 100);
    }
    
    function changeProfileImage() {
        const url = prompt(currentLang === 'ar' ? 'أدخل رابط الصورة:' : 'Enter image URL:');
        if (url) {
            currentUser.profileImage = url;
            persistUser(currentUser);
            renderMainApp();
        }
    }
    
    function renderLoginScreen() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="login-container">
                <div class="login-card">
                    <div class="profile-image-container">
                        <div id="profilePreview" class="profile-image-placeholder" onclick="triggerImageUpload()">
                            👤
                        </div>
                        <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="previewImage(this)">
                        <p style="font-size: 12px; margin-top: 8px; color: var(--text-secondary);">${t('changeImage')}</p>
                    </div>
                    <h2 style="text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; background-clip: text; color: transparent;">${t('appTitle')}</h2>
                    <div class="lang-switch" style="justify-content: center; margin-bottom: 20px;">
                        <button class="lang-btn ${currentLang === 'ar' ? 'active' : ''}" onclick="setLang('ar')">عربي</button>
                        <button class="lang-btn ${currentLang === 'en' ? 'active' : ''}" onclick="setLang('en')">EN</button>
                        <button class="theme-toggle lang-btn" onclick="toggleTheme()">🌓</button>
                    </div>
                    <div class="form-group">
                        <label>👤 ${t('name')}</label>
                        <input type="text" id="name" class="login-input" placeholder="${currentLang === 'ar' ? 'أدخل اسمك الكامل' : 'Enter your full name'}">
                    </div>
                    <div class="form-group">
                        <label>📧 ${t('email')}</label>
                        <input type="email" id="email" class="login-input" placeholder="example@email.com">
                    </div>
                    <button id="registerBtn" class="login-btn">${t('startJourney')}</button>
                    <button id="deleteAllBtn" class="login-btn btn-danger" style="margin-top: 12px;">🗑️ ${t('deleteAllData')}</button>
                </div>
            </div>
        `;
        
        let tempImageData = null;
        window.triggerImageUpload = () => document.getElementById('imageUpload').click();
        window.previewImage = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempImageData = e.target.result;
                    const preview = document.getElementById('profilePreview');
                    preview.innerHTML = `<img src="${tempImageData}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };
        
        document.getElementById('registerBtn').onclick = () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            if (!name || !email) {
                alert(currentLang === 'ar' ? 'الرجاء إدخال الاسم والبريد الإلكتروني' : 'Please enter name and email');
                return;
            }
            currentUser = registerOrLogin({ name, email, profileImage: tempImageData || null });
            renderMainApp();
        };
        document.getElementById('deleteAllBtn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            if (email) deleteAllUserData(email);
            else alert(currentLang === 'ar' ? 'أدخل البريد الإلكتروني لحذف البيانات' : 'Enter email to delete data');
        };
    }
    
    window.setTab = (tab) => { activeTab = tab; renderMainApp(); };
    window.setLang = (lang) => { currentLang = lang; if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.toggleTheme = () => { isLightMode = !isLightMode; document.body.classList.toggle('light-mode', isLightMode); if (currentUser) renderMainApp(); else renderLoginScreen(); };
    window.deleteAllUserData = deleteAllUserData;
    window.logout = logout;
    window.showAddTimeForm = showAddTimeForm;
    window.changeProfileImage = changeProfileImage;
    
    const savedUsers = loadAllUsers();
    let lastUser = null;
    for (let key in savedUsers) {
        lastUser = savedUsers[key];
        break;
    }
    if (lastUser) {
        currentUser = lastUser;
        checkAndResetDay(currentUser);
        persistUser(currentUser);
        renderMainApp();
    } else {
        renderLoginScreen();
    }
</script>
</body>
</html>
